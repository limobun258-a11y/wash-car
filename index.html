        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);

            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border-color: rgba(147, 197, 253, 0.5);
        }
        .brand-chip.active {
            background: rgba(59, 130, 246, 0.4);
            color: white;
        }

</head>

        let currentTypeFilter = null;

        const tabsEl = document.getElementById('tabs');
        const brandFiltersEl = document.getElementById('brandFilters');
        const gridEl = document.getElementById('productGrid');
        const knowledgeEl = document.getElementById('knowledgeView');
        const emptyEl = document.getElementById('emptyState');
        const countEl = document.getElementById('resultCount');
        const searchEl = document.getElementById('search');
        const searchAllToggleEl = document.getElementById('searchAllToggle');

        function renderTabs() {
            tabsEl.innerHTML = categories.map(c => `
                <button data-cat="${c}" class="tab-btn text-sm px-4 py-2 rounded-lg border border-white/10 bg-gray-800/40 hover:bg-gray-700/50 transition ${c === currentCategory && !searchAllCategories ? 'active' : ''}">${c}</button>
            `).join('');
            tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.cat;
                    activeBrands = new Set();
                    searchEl.value = "";
                    searchText = "";
                    searchAllCategories = false;
                    searchAllToggleEl.checked = false;
                    currentTypeFilter = null;
                    render();
                });
            });
        }

        function getBrands(items) {
            return [...new Set(items.map(i => i.廠牌).filter(Boolean))];
        }

        function renderBrandFilters(items) {
            const brands = getBrands(items);
            brandFiltersEl.innerHTML = brands.map(b => `
                <button data-brand="${b}" class="brand-chip text-xs px-3 py-1.5 rounded-full border border-white/10 bg-gray-800/40 hover:bg-gray-700/50 transition ${activeBrands.has(b) ? 'active' : ''}">${b}</button>
            `).join('');
            brandFiltersEl.querySelectorAll('.brand-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const b = chip.dataset.brand;
                    if (activeBrands.has(b)) activeBrands.delete(b); else activeBrands.add(b);
                    render();
                });
            });
        }

        function priceRangeText(capacityPrice) {
            const list = Array.isArray(capacityPrice) ? capacityPrice : [capacityPrice];
            const nums = list.map(x => x.價格數字).filter(n => n !== null && n !== undefined);
            if (nums.length === 0) return "";
            const min = Math.min(...nums), max = Math.max(...nums);
            return min === max ? `$${min}` : `$${min} ~ $${max}`;
        }

        function capacityListHtml(capacityPrice, rowIdx) {
            const list = Array.isArray(capacityPrice) ? capacityPrice : [capacityPrice];
            return list.map((x, capIdx) => `
                <span class="text-xs bg-slate-700/50 px-2 py-1 rounded whitespace-nowrap editable-cap" contenteditable="true" data-row-idx="${rowIdx}" data-cap-idx="${capIdx}">${x.容量 || ''} ${x.價格文字 || ''}</span>
            `).join('');
        }

        function fieldRow(label, value, field, rowIdx) {
            if (!value) return '';
            if (field === undefined) {
                return `<p class="text-xs text-blue-200/60 mb-1"><span class="text-blue-300/80">${label}：</span>${value}</p>`;
            }
            return `<p class="text-xs text-blue-200/60 mb-1"><span class="text-blue-300/80">${label}：</span><span class="editable-field" contenteditable="true" data-row-idx="${rowIdx}" data-field="${field}">${value}</span></p>`;
        }

        function pickField(item, candidates) {
            for (const c of candidates) {
                if (item[c] !== undefined && item[c] !== null && String(item[c]).trim() !== '') {
                    return { value: item[c], field: c };
                }
            }
            return { value: '', field: candidates[0] };
        }

        function groupByType(items) {
            const map = new Map();
            for (const item of items) {
                const key = item.種類 || '';
                if (!map.has(key)) map.set(key, []);
                map.get(key).push(item);
            }
            return [...map.entries()];
        }

        function typeCardHtml(typeName, count) {
            return `
                <div class="glass-card p-6 transition hover:scale-105 cursor-pointer type-card" data-type="${typeName}">
                    <h3 class="text-xl font-bold text-blue-300 glow-text text-center">${typeName}</h3>
                    <p class="text-xs text-blue-200/50 text-center mt-2">共 ${count} 項產品</p>
                </div>
            `;
        }

        function productCardHtml(item, rowIdx, categoryLabel) {
            const titleField = item.名稱 ? '名稱' : '種類';
            const title = item.名稱 || item.種類 || '';
            const subtitle = item.名稱 && item.種類 && item.名稱 !== item.種類 ? item.種類 : '';

            const feature = pickField(item, ['產品特色', '功能簡述', '效能', '使用重點']);
            const usage = pickField(item, ['主要用途', '使用時機']);
            const workability = pickField(item, ['操作性', '操作方式']);
            const durability = pickField(item, ['持久度', '持久力', '鍍膜持久度', '使用效期']);

            return `
                <div class="glass-card p-5 transition hover:scale-[1.02]">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex gap-1.5 flex-wrap">
                            <span class="text-xs bg-blue-500/30 px-2 py-1 rounded text-blue-300 editable-field" contenteditable="true" data-row-idx="${rowIdx}" data-field="廠牌">${item.廠牌 || ''}</span>
                            ${categoryLabel ? `<span class="text-xs bg-slate-600/40 px-2 py-1 rounded text-blue-200/70">${categoryLabel}</span>` : ''}
                        </div>
                        <span class="text-sm font-semibold text-blue-300">${priceRangeText(item.容量價格)}</span>
                    </div>
                    <h3 class="text-lg font-bold mb-1 text-white editable-field" contenteditable="true" data-row-idx="${rowIdx}" data-field="${titleField}">${title}</h3>
                    ${subtitle ? `<p class="text-xs text-blue-400/70 mb-2 editable-field" contenteditable="true" data-row-idx="${rowIdx}" data-field="種類">${subtitle}</p>` : ''}
                    ${fieldRow('特色', feature.value, feature.field, rowIdx)}
                    ${fieldRow('用途', usage.value, usage.field, rowIdx)}
                    ${fieldRow('屬性', item.屬性, '屬性', rowIdx)}
                    ${fieldRow('稀釋比例', item.稀釋比例, '稀釋比例', rowIdx)}
                    ${fieldRow('操作性', workability.value, workability.field, rowIdx)}
                    ${fieldRow('持久度', durability.value, durability.field, rowIdx)}
                    ${fieldRow('撥水角度/硬度', item['撥水角度/硬度'], '撥水角度/硬度', rowIdx)}
                    ${fieldRow('使用方式', item.使用方式, '使用方式', rowIdx)}
                    ${fieldRow('使用量', item.使用量, '使用量', rowIdx)}
                    <div class="flex flex-wrap gap-1.5 mt-3">${capacityListHtml(item.容量價格, rowIdx)}</div>
                </div>
            `;
        }

        function bindEditableCards(renderedItems) {
            gridEl.querySelectorAll('.editable-field').forEach(el => {
                el.addEventListener('blur', () => {
                    const idx = Number(el.dataset.rowIdx);
                    const item = renderedItems[idx];
                    if (!item) return;
                    item[el.dataset.field] = el.textContent.trim();
                });
            });
            gridEl.querySelectorAll('.editable-cap').forEach(el => {
                el.addEventListener('blur', () => {
                    const idx = Number(el.dataset.rowIdx);
                    const capIdx = Number(el.dataset.capIdx);
                    const item = renderedItems[idx];
                    if (!item) return;
                    let capList = item.容量價格;
                    if (!Array.isArray(capList)) capList = [capList];
                    const text = el.textContent.trim();
                    const dollarIdx = text.indexOf('$');
                    let cap, priceText;
                    if (dollarIdx === -1) {
                        cap = text; priceText = '';
                    } else {
                        cap = text.slice(0, dollarIdx).trim();
                        priceText = text.slice(dollarIdx).trim();
                    }
                    const priceNum = parseFloat(priceText.replace(/[^\d.]/g, ''));
                    capList[capIdx] = {
                        容量: cap,
                        價格文字: priceText,
                        價格數字: isNaN(priceNum) ? null : priceNum
                    };
                    item.容量價格 = capList;
                });
            });
        }

        function knowledgeCardHtml(group) {
            const steps = group.步驟.map(s => `
                <li class="flex gap-3 py-2 border-b border-white/5 last:border-0">
                    <span class="text-blue-400 font-bold w-6 shrink-0">${s.順序}</span>
                    <div>
                        <p class="text-sm text-white font-medium">${s.用途}</p>
                        <p class="text-xs text-blue-300/70">${s.藥水與工具}</p>
                        <p class="text-xs text-blue-200/50 mt-0.5">${s.流程}</p>
                    </div>
                </li>
            `).join('');
            return `
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-3 text-blue-300 glow-text">${group.工法}</h3>
                    <ol class="divide-y divide-white/5">${steps}</ol>
                </div>
            `;
        }

        function matchesSearch(item, text) {
            if (!text) return true;
            const haystack = Object.values(item).map(v => typeof v === 'string' ? v : '').join(' ').toLowerCase();
            return haystack.includes(text.toLowerCase());
        }

        function renderGlobalSearch() {
            gridEl.classList.remove('hidden');
            knowledgeEl.classList.add('hidden');
            brandFiltersEl.parentElement.querySelector('#search').style.display = '';
            searchAllToggleEl.closest('label').style.display = '';
            brandFiltersEl.style.display = '';

            const allPairs = categories
                .filter(c => c !== '知識系列')
                .flatMap(c => DATA[c].map(item => ({ item, cat: c })));

            renderBrandFilters(allPairs.map(p => p.item));
            const filteredPairs = allPairs.filter(({ item }) => {
                const brandOk = activeBrands.size === 0 || activeBrands.has(item.廠牌);
                const searchOk = matchesSearch(item, searchText);
                return brandOk && searchOk;
            });

            gridEl.innerHTML = filteredPairs.map(({ item, cat }, idx) => productCardHtml(item, idx, cat)).join('');
            bindEditableCards(filteredPairs.map(p => p.item));
            emptyEl.classList.toggle('hidden', filteredPairs.length > 0);
            countEl.textContent = `共 ${filteredPairs.length} / ${allPairs.length} 項產品（全部分類）`;
        }

        function render() {
            renderTabs();
            if (searchAllCategories) {
                renderGlobalSearch();
                return;
            }
            const isKnowledge = currentCategory === '知識系列';
            gridEl.classList.toggle('hidden', isKnowledge);
            knowledgeEl.classList.toggle('hidden', !isKnowledge);
            brandFiltersEl.parentElement.querySelector('#search').style.display = isKnowledge ? 'none' : '';
            searchAllToggleEl.closest('label').style.display = isKnowledge ? 'none' : '';
            brandFiltersEl.style.display = isKnowledge ? 'none' : '';

            if (isKnowledge) {
                knowledgeEl.innerHTML = DATA[currentCategory].map(knowledgeCardHtml).join('');
                emptyEl.classList.add('hidden');
                countEl.textContent = `${DATA[currentCategory].length} 套工法`;
                return;
            }

            const items = DATA[currentCategory];
            renderBrandFilters(items);

            const hasActiveFilter = searchText.trim() !== '' || activeBrands.size > 0;

            if (!hasActiveFilter && !currentTypeFilter) {
                // 種類網格（預設畫面）：先選種類，不直接攤開全部產品
                const groups = groupByType(items);
                gridEl.innerHTML = groups.map(([type, groupItems]) => typeCardHtml(type, groupItems.length)).join('');
                gridEl.querySelectorAll('.type-card').forEach(card => {
                    card.addEventListener('click', () => {
                        currentTypeFilter = card.dataset.type;
                        render();
                    });
                });
                emptyEl.classList.add('hidden');
                countEl.textContent = `${groups.length} 個種類`;
                return;
            }

            let filtered;
            let backButtonHtml = '';
            if (!hasActiveFilter && currentTypeFilter) {
                filtered = items.filter(item => (item.種類 || '') === currentTypeFilter);
                backButtonHtml = `<button id="backToTypes" class="col-span-full text-sm text-gray-400 hover:text-white bg-gray-800/50 backdrop-blur px-4 py-2 rounded-lg transition mb-1 w-fit">← 返回種類</button>`;
            } else {
                filtered = items.filter(item => {
                    const brandOk = activeBrands.size === 0 || activeBrands.has(item.廠牌);
                    const searchOk = matchesSearch(item, searchText);
                    return brandOk && searchOk;
                });
            }

            gridEl.innerHTML = backButtonHtml + filtered.map((item, idx) => productCardHtml(item, idx)).join('');
            bindEditableCards(filtered);
            if (!hasActiveFilter && currentTypeFilter) {
                document.getElementById('backToTypes').addEventListener('click', () => {
                    currentTypeFilter = null;
                    render();
                });
            }
            emptyEl.classList.toggle('hidden', filtered.length > 0);
            countEl.textContent = `共 ${filtered.length} / ${items.length} 項產品`;
        }

        searchEl.addEventListener('input', (e) => {
            searchText = e.target.value;
            render();
        });

        searchAllToggleEl.addEventListener('change', (e) => {
            searchAllCategories = e.target.checked;
            render();
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            document.getElementById('product-data').textContent =
                JSON.stringify(DATA, (key, value) => key === '__category' ? undefined : value);
            const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'wash-products.html';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(a.href);

            const status = document.getElementById('saveStatus');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        });

        const params = new URLSearchParams(location.search);
        const catParam = params.get('cat');
        const qParam = params.get('q');
        if (qParam) {
            searchAllCategories = true;
            searchAllToggleEl.checked = true;
            searchEl.value = qParam;
            searchText = qParam;
        } else if (catParam && categories.includes(catParam)) {
            currentCategory = catParam;
        }

        render();
    </script>
</body>
</html>
